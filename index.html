<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>荣格16型人格测试</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=Noto+Serif+SC:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1410;
    --parchment: #f5f0e8;
    --gold: #c9a84c;
    --gold-light: #e8d5a3;
    --rust: #8b4513;
    --deep: #2c1810;
    --mist: #9b9080;
    --cream: #faf7f0;
    --shadow: rgba(26,20,16,0.15);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Serif SC', 'Cormorant Garamond', serif;
    background: var(--parchment);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      radial-gradient(ellipse at 20% 50%, rgba(201,168,76,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(139,69,19,0.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }
  .page-border {
    position: fixed;
    inset: 16px;
    border: 1px solid rgba(201,168,76,0.3);
    pointer-events: none;
    z-index: 100;
  }
  .page-border::before {
    content: '';
    position: absolute;
    inset: 4px;
    border: 1px solid rgba(201,168,76,0.15);
  }
  .corner { position: fixed; width: 60px; height: 60px; z-index: 101; opacity: 0.5; }
  .corner svg { width: 100%; height: 100%; }
  .corner-tl { top: 10px; left: 10px; }
  .corner-tr { top: 10px; right: 10px; transform: scaleX(-1); }
  .corner-bl { bottom: 10px; left: 10px; transform: scaleY(-1); }
  .corner-br { bottom: 10px; right: 10px; transform: scale(-1); }

  .screen {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 24px;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }
  .screen.active { opacity: 1; transform: translateY(0); }
  .screen.hidden { display: none; }

  .intro-mandala {
    width: 120px; height: 120px; margin-bottom: 32px;
    animation: mandala-spin 30s linear infinite; opacity: 0.7;
  }
  @keyframes mandala-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  .eyebrow {
    font-family: 'Cinzel', serif; font-size: 10px;
    letter-spacing: 0.4em; color: var(--gold); text-transform: uppercase; margin-bottom: 20px;
  }
  h1 {
    font-family: 'Cinzel', serif; font-size: clamp(28px, 5vw, 52px);
    font-weight: 400; color: var(--deep); text-align: center;
    line-height: 1.2; margin-bottom: 12px; letter-spacing: 0.05em;
  }
  .subtitle {
    font-family: 'Cormorant Garamond', serif; font-size: clamp(14px, 2.5vw, 20px);
    font-style: italic; color: var(--mist); text-align: center;
    margin-bottom: 48px; letter-spacing: 0.02em;
  }
  .divider { display: flex; align-items: center; gap: 16px; margin-bottom: 40px; width: 100%; max-width: 400px; }
  .divider-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
  .divider-gem { width: 8px; height: 8px; background: var(--gold); transform: rotate(45deg); }
  .intro-text { max-width: 560px; text-align: center; line-height: 1.9; color: #4a3f35; font-size: 15px; margin-bottom: 48px; }

  .btn-primary {
    font-family: 'Cinzel', serif; font-size: 13px; letter-spacing: 0.25em;
    text-transform: uppercase; color: var(--cream); background: var(--deep);
    border: none; padding: 18px 48px; cursor: pointer; position: relative;
    transition: all 0.3s ease;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }
  .btn-primary:hover { background: var(--rust); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(139,69,19,0.3); }

  /* QUIZ */
  #quiz-screen { padding: 80px 24px 100px; justify-content: flex-start; }
  .progress-container { width: 100%; max-width: 700px; margin-bottom: 48px; }
  .progress-meta { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
  .progress-label { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 0.3em; color: var(--gold); }
  .progress-count { font-family: 'Cormorant Garamond', serif; font-size: 22px; color: var(--mist); }
  .progress-count span { color: var(--deep); font-weight: 600; }
  .progress-bar-track { height: 2px; background: rgba(201,168,76,0.2); position: relative; }
  .progress-bar-fill {
    height: 100%; background: linear-gradient(90deg, var(--rust), var(--gold));
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); position: relative;
  }
  .progress-bar-fill::after {
    content: ''; position: absolute; right: -4px; top: 50%; transform: translateY(-50%);
    width: 8px; height: 8px; background: var(--gold); border-radius: 50%; box-shadow: 0 0 8px var(--gold);
  }

  .question-wrapper { width: 100%; max-width: 700px; position: relative; overflow: hidden; }
  .question-card {
    background: var(--cream); border: 1px solid rgba(201,168,76,0.25); padding: 48px;
    position: relative; box-shadow: 0 4px 40px var(--shadow), inset 0 1px 0 rgba(255,255,255,0.8);
  }
  .question-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 3px; background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .question-number {
    font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 0.4em;
    color: var(--gold); margin-bottom: 20px; display: flex; align-items: center; gap: 12px;
  }
  .question-number::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, rgba(201,168,76,0.4), transparent); }
  .question-text {
    font-family: 'Noto Serif SC', serif; font-size: clamp(15px, 2.2vw, 20px);
    font-weight: 300; line-height: 1.75; color: var(--deep); margin-bottom: 32px; letter-spacing: 0.03em;
  }

  /* LIKERT SCALE */
  .likert-container { width: 100%; }
  .likert-poles {
    display: flex; justify-content: space-between; margin-bottom: 10px;
    font-family: 'Noto Serif SC', serif; font-size: 13px; color: #7a6a5a;
  }
  .likert-pole-left { text-align: left; max-width: 45%; line-height: 1.4; }
  .likert-pole-right { text-align: right; max-width: 45%; line-height: 1.4; color: #7a6a5a; }

  .likert-scale {
    display: flex; gap: 8px; justify-content: center; padding: 16px 0; align-items: flex-end;
  }
  .likert-option {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    cursor: pointer; flex: 1;
  }
  .likert-btn {
    width: 100%; aspect-ratio: 1; border: 1.5px solid rgba(201,168,76,0.3);
    background: transparent; cursor: pointer;
    transition: all 0.2s ease; position: relative; border-radius: 2px;
    display: flex; align-items: center; justify-content: center;
  }
  .likert-option:nth-child(1) .likert-btn { width: 38px; height: 38px; }
  .likert-option:nth-child(2) .likert-btn { width: 34px; height: 34px; }
  .likert-option:nth-child(3) .likert-btn { width: 28px; height: 28px; border-color: rgba(155,144,128,0.3); }
  .likert-option:nth-child(4) .likert-btn { width: 34px; height: 34px; }
  .likert-option:nth-child(5) .likert-btn { width: 38px; height: 38px; }

  .likert-btn:hover { border-color: var(--gold); background: rgba(201,168,76,0.08); }
  .likert-btn.selected-1 { background: #8b4513; border-color: #8b4513; }
  .likert-btn.selected-2 { background: #c9a84c; border-color: #c9a84c; }
  .likert-btn.selected-3 { background: rgba(155,144,128,0.3); border-color: var(--mist); }
  .likert-btn.selected-4 { background: #7a9b6e; border-color: #7a9b6e; }
  .likert-btn.selected-5 { background: #4a7a5a; border-color: #4a7a5a; }

  .likert-label {
    font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 0.1em;
    color: var(--mist); text-align: center; line-height: 1.3;
  }

  .likert-scale-labels {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px;
    margin-top: 4px; text-align: center;
  }
  .scale-label-item {
    font-size: 10px; color: var(--mist); font-family: 'Cinzel', serif;
    letter-spacing: 0.05em; line-height: 1.3;
  }

  /* NAV */
  .nav-buttons { display: flex; gap: 16px; margin-top: 32px; justify-content: space-between; width: 100%; max-width: 700px; }
  .btn-nav {
    font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 0.2em;
    text-transform: uppercase; padding: 14px 32px; border: 1px solid rgba(201,168,76,0.3);
    background: transparent; color: var(--mist); cursor: pointer; transition: all 0.25s;
    display: flex; align-items: center; gap: 10px;
  }
  .btn-nav:hover:not(:disabled) { border-color: var(--gold); color: var(--deep); }
  .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-submit {
    font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 0.25em;
    text-transform: uppercase; padding: 14px 40px; background: var(--deep);
    color: var(--cream); border: none; cursor: pointer; transition: all 0.3s;
    clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%); display: none;
  }
  .btn-submit:hover { background: var(--rust); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(139,69,19,0.3); }
  .btn-submit.visible { display: flex; align-items: center; gap: 10px; }

  /* SLIDE ANIMATIONS */
  .slide-out-left { animation: slideOutLeft 0.3s ease forwards; }
  .slide-in-right { animation: slideInRight 0.3s ease forwards; }
  .slide-out-right { animation: slideOutRight 0.3s ease forwards; }
  .slide-in-left { animation: slideInLeft 0.3s ease forwards; }
  @keyframes slideOutLeft { to { transform: translateX(-60px); opacity: 0; } }
  @keyframes slideInRight { from { transform: translateX(60px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes slideOutRight { to { transform: translateX(60px); opacity: 0; } }
  @keyframes slideInLeft { from { transform: translateX(-60px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  /* UNANSWERED MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(26,20,16,0.7);
    z-index: 300; display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal-box {
    background: var(--cream); border: 1px solid rgba(201,168,76,0.4);
    padding: 48px; max-width: 560px; width: 90%; position: relative;
    box-shadow: 0 20px 60px rgba(26,20,16,0.3);
  }
  .modal-box::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 3px; background: linear-gradient(90deg, transparent, var(--rust), transparent);
  }
  .modal-title { font-family: 'Cinzel', serif; font-size: 14px; letter-spacing: 0.3em; color: var(--rust); margin-bottom: 8px; }
  .modal-subtitle { font-size: 14px; color: var(--mist); margin-bottom: 24px; line-height: 1.6; }
  .unanswered-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 28px; }
  .unanswered-btn {
    font-family: 'Cinzel', serif; font-size: 12px; padding: 8px 14px;
    border: 1px solid rgba(201,168,76,0.4); background: transparent;
    color: var(--rust); cursor: pointer; transition: all 0.2s; letter-spacing: 0.1em;
  }
  .unanswered-btn:hover { background: var(--rust); color: var(--cream); border-color: var(--rust); }
  .modal-close {
    font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 0.3em;
    padding: 12px 28px; border: 1px solid rgba(201,168,76,0.3); background: transparent;
    color: var(--mist); cursor: pointer; transition: all 0.2s;
  }
  .modal-close:hover { border-color: var(--gold); color: var(--deep); }

  /* RESULT */
  #result-screen { padding: 80px 24px; max-width: 960px; margin: 0 auto; }
  .result-header { text-align: center; margin-bottom: 56px; }
  .result-type-badge {
    font-family: 'Cinzel', serif; font-size: clamp(48px, 10vw, 96px);
    font-weight: 600; color: var(--deep); letter-spacing: 0.15em; line-height: 1;
    margin-bottom: 16px; position: relative; display: inline-block;
  }
  .result-type-badge::after {
    content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
    width: 60%; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .result-archetype { font-family: 'Cormorant Garamond', serif; font-size: clamp(20px, 4vw, 32px); font-style: italic; color: var(--rust); margin-top: 24px; margin-bottom: 8px; }
  .result-tagline { font-family: 'Cinzel', serif; font-size: 10px; color: var(--mist); letter-spacing: 0.15em; }

  /* CHARACTER ILLUSTRATION */
  .character-showcase {
    display: flex; align-items: center; justify-content: center;
    gap: 48px; margin-bottom: 48px; flex-wrap: wrap;
  }
  .character-svg-wrap {
    width: 200px; height: 260px; position: relative;
    filter: drop-shadow(0 8px 24px rgba(139,69,19,0.15));
  }
  .character-svg-wrap svg { width: 100%; height: 100%; }

  .dimension-bars {
    background: var(--cream); border: 1px solid rgba(201,168,76,0.2);
    padding: 40px; margin-bottom: 40px; box-shadow: 0 2px 20px var(--shadow);
  }
  .dimension-title { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 0.4em; color: var(--gold); margin-bottom: 28px; text-align: center; }
  .dim-row { display: grid; grid-template-columns: 60px 1fr 60px; align-items: center; gap: 16px; margin-bottom: 20px; }
  .dim-label { font-family: 'Cinzel', serif; font-size: 13px; color: var(--deep); font-weight: 600; }
  .dim-label.right { text-align: right; }
  .dim-label.dim { color: var(--mist); font-weight: 400; }
  .dim-bar-track { height: 8px; background: rgba(201,168,76,0.15); position: relative; }
  .dim-bar-fill {
    height: 100%; position: absolute;
    transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    background: linear-gradient(90deg, var(--gold), var(--rust));
  }
  .dim-pct { position: absolute; top: -20px; font-family: 'Cinzel', serif; font-size: 10px; color: var(--rust); transition: left 1.2s cubic-bezier(0.4, 0, 0.2, 1); transform: translateX(-50%); }

  .result-sections { display: grid; gap: 24px; }
  .result-section {
    background: var(--cream); border: 1px solid rgba(201,168,76,0.2);
    padding: 36px 40px; box-shadow: 0 2px 20px var(--shadow); position: relative;
  }
  .result-section::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px; background: linear-gradient(180deg, var(--gold), var(--rust));
  }
  .section-label { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 0.4em; color: var(--gold); margin-bottom: 12px; }
  .section-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; color: var(--deep); margin-bottom: 16px; font-weight: 600; }
  .section-body { font-size: 15px; line-height: 1.85; color: #4a3f35; }
  .traits-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-top: 16px; }
  .trait-tag { padding: 10px 16px; border: 1px solid rgba(201,168,76,0.3); text-align: center; font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 0.15em; color: var(--deep); background: rgba(201,168,76,0.05); }
  .compatible-types { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 16px; }
  .type-pill { padding: 8px 20px; border: 1px solid var(--gold); font-family: 'Cinzel', serif; font-size: 13px; color: var(--rust); letter-spacing: 0.1em; }
  .btn-restart {
    margin-top: 48px; font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 0.25em;
    text-transform: uppercase; padding: 16px 48px; background: transparent; color: var(--deep);
    border: 1px solid rgba(201,168,76,0.4); cursor: pointer; transition: all 0.3s;
  }
  .btn-restart:hover { background: var(--deep); color: var(--cream); border-color: var(--deep); }

  /* LOADING */
  .loading-screen {
    position: fixed; inset: 0; background: var(--parchment); z-index: 200;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: opacity 0.8s ease;
  }
  .loading-screen.fade-out { opacity: 0; pointer-events: none; }
  .hourglass { width: 48px; height: 48px; animation: hourglass-flip 2s ease-in-out infinite; margin-bottom: 24px; opacity: 0.5; }
  @keyframes hourglass-flip { 0%, 40% { transform: rotate(0deg); } 50%, 90% { transform: rotate(180deg); } 100% { transform: rotate(180deg); } }
  .loading-text { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 0.4em; color: var(--mist); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }

  @media (max-width: 600px) {
    .question-card { padding: 28px 16px; }
    .dim-row { grid-template-columns: 40px 1fr 40px; }
    .result-section { padding: 24px 16px; }
    .dimension-bars { padding: 24px 16px; }
    .likert-option:nth-child(1) .likert-btn { width: 32px; height: 32px; }
    .likert-option:nth-child(2) .likert-btn { width: 28px; height: 28px; }
    .likert-option:nth-child(3) .likert-btn { width: 22px; height: 22px; }
    .likert-option:nth-child(4) .likert-btn { width: 28px; height: 28px; }
    .likert-option:nth-child(5) .likert-btn { width: 32px; height: 32px; }
  }
</style>
</head>
<body>

<div class="page-border"></div>
<div class="corner corner-tl"><svg viewBox="0 0 60 60" fill="none"><path d="M4 4 L4 30 M4 4 L30 4" stroke="#c9a84c" stroke-width="1"/><path d="M4 4 L20 20" stroke="#c9a84c" stroke-width="0.5"/><circle cx="4" cy="4" r="3" stroke="#c9a84c" stroke-width="1"/><path d="M12 4 L12 12 L4 12" stroke="#c9a84c" stroke-width="0.5" fill="none"/></svg></div>
<div class="corner corner-tr"><svg viewBox="0 0 60 60" fill="none"><path d="M4 4 L4 30 M4 4 L30 4" stroke="#c9a84c" stroke-width="1"/><path d="M4 4 L20 20" stroke="#c9a84c" stroke-width="0.5"/><circle cx="4" cy="4" r="3" stroke="#c9a84c" stroke-width="1"/><path d="M12 4 L12 12 L4 12" stroke="#c9a84c" stroke-width="0.5" fill="none"/></svg></div>
<div class="corner corner-bl"><svg viewBox="0 0 60 60" fill="none"><path d="M4 4 L4 30 M4 4 L30 4" stroke="#c9a84c" stroke-width="1"/><path d="M4 4 L20 20" stroke="#c9a84c" stroke-width="0.5"/><circle cx="4" cy="4" r="3" stroke="#c9a84c" stroke-width="1"/><path d="M12 4 L12 12 L4 12" stroke="#c9a84c" stroke-width="0.5" fill="none"/></svg></div>
<div class="corner corner-br"><svg viewBox="0 0 60 60" fill="none"><path d="M4 4 L4 30 M4 4 L30 4" stroke="#c9a84c" stroke-width="1"/><path d="M4 4 L20 20" stroke="#c9a84c" stroke-width="0.5"/><circle cx="4" cy="4" r="3" stroke="#c9a84c" stroke-width="1"/><path d="M12 4 L12 12 L4 12" stroke="#c9a84c" stroke-width="0.5" fill="none"/></svg></div>

<div class="loading-screen" id="loading">
  <svg class="hourglass" viewBox="0 0 48 48" fill="none">
    <path d="M12 6h24M12 42h24M14 6C14 16 24 20 24 24C24 28 14 32 14 42M34 6C34 16 24 20 24 24C24 28 34 32 34 42" stroke="#c9a84c" stroke-width="1.5"/>
    <circle cx="24" cy="26" r="3" fill="#c9a84c" opacity="0.6"/>
  </svg>
  <div class="loading-text">正在准备测试 · · ·</div>
</div>

<!-- UNANSWERED MODAL -->
<div class="modal-overlay" id="unanswered-modal">
  <div class="modal-box">
    <div class="modal-title">⚠ 尚有题目未完成</div>
    <div class="modal-subtitle" id="modal-subtitle">以下题目尚未作答，点击题号可直接跳转：</div>
    <div class="unanswered-grid" id="unanswered-grid"></div>
    <button class="modal-close" onclick="closeModal()">继续作答</button>
  </div>
</div>

<!-- INTRO -->
<div class="screen hidden" id="intro-screen">
  <svg class="intro-mandala" viewBox="0 0 120 120" fill="none">
    <circle cx="60" cy="60" r="55" stroke="#c9a84c" stroke-width="0.5" stroke-dasharray="4 4"/>
    <circle cx="60" cy="60" r="40" stroke="#c9a84c" stroke-width="0.5"/>
    <circle cx="60" cy="60" r="25" stroke="#c9a84c" stroke-width="1"/>
    <circle cx="60" cy="60" r="8" fill="#c9a84c" opacity="0.3"/>
    <path d="M60 5 L60 115 M5 60 L115 60" stroke="#c9a84c" stroke-width="0.3"/>
    <path d="M60 5 L100 95 L15 38 L105 38 L20 95 Z" stroke="#c9a84c" stroke-width="0.4" fill="none"/>
    <path d="M60 20 L74 55 L110 55 L82 76 L92 110 L60 88 L28 110 L38 76 L10 55 L46 55 Z" stroke="#c9a84c" stroke-width="0.3" fill="none" opacity="0.5"/>
  </svg>
  <div class="eyebrow">基于荣格心理学理论</div>
  <h1>十六型人格</h1>
  <div class="subtitle">探索你灵魂最深处的认知密码</div>

      <!-- big joyful smile -->
      <path d="M88 50 Q100 60 112 50" stroke="${c}" stroke-width="2.5" fill="none"/>
      <!-- rosy cheeks -->
      <circle cx="85" cy="48" r="4" fill="${c}" opacity="0.15"/>
      <circle cx="115" cy="48" r="4" fill="${c}" opacity="0.15"/>
      <!-- hair with flair -->
      <path d="M72 26 Q100 15 128 26" stroke="${c}" stroke-width="2" fill="none" opacity="0.3"/>
      <path d="M72 26 Q62 40 66 70" stroke="${c}" stroke-width="6" stroke-linecap="round" opacity="0.12"/>
      <path d="M128 26 Q138 40 134 70" stroke="${c}" stroke-width="6" stroke-linecap="round" opacity="0.12"/>
      <!-- body: flowy, dancer -->
      <path d="M78 78 L60 200 L140 200 L122 78 Q100 66 78 78Z" fill="${c}" opacity="0.12" stroke="${c}" stroke-width="1.2"/>
      <rect x="94" y="60" width="12" height="18" rx="4" fill="${c}" opacity="0.18"/>
      <!-- arms in dance pose -->
      <path d="M78 90 L44 70 L48 62 L80 82" stroke="${c}" stroke-width="9" stroke-linecap="round" fill="none" opacity="0.18"/>
      <path d="M122 90 L155 115 L150 122 L120 104" stroke="${c}" stroke-width="9" stroke-linecap="round" fill="none" opacity="0.18"/>
      <!-- confetti -->
      <rect x="35" y="55" width="6" height="4" rx="1" fill="${c}" opacity="0.3" transform="rotate(20 35 55)"/>
      <rect x="165" y="65" width="5" height="3" rx="1" fill="${c}" opacity="0.3" transform="rotate(-15 165 65)"/>
      <circle cx="28" cy="80" r="3" fill="${c}" opacity="0.2"/>
      <circle cx="172" cy="50" r="2.5" fill="${c}" opacity="0.25"/>
      <rect x="160" y="90" width="4" height="3" rx="1" fill="${c}" opacity="0.2" transform="rotate(30 160 90)"/>
      <!-- dancing legs -->
      <path d="M86 200 L76 235" stroke="${c}" stroke-width="12" stroke-linecap="round" opacity="0.15"/>
      <path d="M114 200 L126 230" stroke="${c}" stroke-width="12" stroke-linecap="round" opacity="0.15" transform="rotate(5 114 200)"/>

      <ellipse cx="127" cy="233" rx="12" ry="5" fill="${c}" opacity="0.3"/>
    </svg>`,
  };

  return chars[type] || chars['INFJ'];
}

// ============================================================
// APP STATE
// ============================================================
let questions = [];
let answers = {};
let currentIndex = 0;
let isNavigating = false; // BUG FIX: prevent double-navigation

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startTest() {
  questions = shuffleArray(RAW_QUESTIONS);
  answers = {};
  currentIndex = 0;
  isNavigating = false;
  showScreen('quiz-screen');
  renderQuestion(0);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.add('hidden');
    s.classList.remove('active');
  });
  const el = document.getElementById(id);
  el.classList.remove('hidden');
  setTimeout(() => el.classList.add('active'), 20);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderQuestion(index, direction = 'none') {
  const card = document.getElementById('question-card');
  const q = questions[index];
  const total = questions.length;

  document.getElementById('current-q').textContent = index + 1;
  document.getElementById('progress-fill').style.width = ((index + 1) / total * 100) + '%';

  const doFill = () => {
    fillCard(q, index);
    updateNavButtons();
    isNavigating = false; // BUG FIX: reset after fill
  };

  if (direction === 'forward') {
    card.classList.add('slide-out-left');
    setTimeout(() => {
      card.classList.remove('slide-out-left');
      doFill();
      card.classList.add('slide-in-right');
      setTimeout(() => card.classList.remove('slide-in-right'), 300);
    }, 300);
  } else if (direction === 'back') {
    card.classList.add('slide-out-right');
    setTimeout(() => {
      card.classList.remove('slide-out-right');
      doFill();
      card.classList.add('slide-in-left');
      setTimeout(() => card.classList.remove('slide-in-left'), 300);
    }, 300);
  } else {
    doFill();
  }
}

function fillCard(q, index) {
  document.getElementById('q-number').textContent = `QUESTION ${String(index + 1).padStart(2, '0')}`;
  document.getElementById('q-text').textContent = q.text;

  const saved = answers[index]; // 1-5 or undefined
  const labels = ['非常符合', '比较符合', '中立', '不太符合', '完全不符合'];

  document.getElementById('likert-container').innerHTML = `
    <div class="likert-container">
      <div class="likert-scale">
        ${[1,2,3,4,5].map(v => `
          <div class="likert-option">
            <button class="likert-btn ${saved === v ? 'selected-'+v : ''}"
              onclick="selectAnswer(${index}, ${v})"
              title="${labels[v-1]}">
            </button>
            <div class="likert-label">${labels[v-1]}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function selectAnswer(index, value) {
  answers[index] = value;

  // re-render options highlight
  [1,2,3,4,5].forEach((v, i) => {
    const btns = document.querySelectorAll('.likert-btn');
    if (btns[i]) {
      btns[i].className = 'likert-btn' + (v === value ? ' selected-'+v : '');
    }
  });

  updateNavButtons();

  // BUG FIX: use isNavigating guard for auto-advance
  if (index < questions.length - 1 && !isNavigating) {
    isNavigating = true;
    setTimeout(() => {
      currentIndex = index + 1;
      renderQuestion(currentIndex, 'forward');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }, 500);
  } else {
    isNavigating = false;
  }
}

function navigate(dir) {
  if (isNavigating) return; // BUG FIX: block if already navigating
  const newIndex = currentIndex + dir;
  if (newIndex < 0 || newIndex >= questions.length) return;
  isNavigating = true;
  currentIndex = newIndex;
  renderQuestion(currentIndex, dir === 1 ? 'forward' : 'back');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function updateNavButtons() {
  document.getElementById('btn-prev').disabled = currentIndex === 0;
  const isLast = currentIndex === questions.length - 1;
  document.getElementById('btn-next').style.display = isLast ? 'none' : 'flex';
  const submitBtn = document.getElementById('btn-submit');
  submitBtn.classList.toggle('visible', isLast);
}

// UNANSWERED MODAL
function closeModal() {
  document.getElementById('unanswered-modal').classList.remove('open');
}

function jumpToQuestion(index) {
  closeModal();
  isNavigating = false;
  currentIndex = index;
  renderQuestion(index, 'none');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function submitTest() {
  const unansweredIndices = [];
  for (let i = 0; i < questions.length; i++) {
    if (answers[i] === undefined) unansweredIndices.push(i);
  }

  if (unansweredIndices.length > 0) {
    const grid = document.getElementById('unanswered-grid');
    document.getElementById('modal-subtitle').textContent = 
      `还有 ${unansweredIndices.length} 道题目尚未作答，点击题号可直接跳转：`;
    grid.innerHTML = unansweredIndices.map(i =>
      `<button class="unanswered-btn" onclick="jumpToQuestion(${i})">第 ${i+1} 题</button>`
    ).join('');
    document.getElementById('unanswered-modal').classList.add('open');
    return;
  }

  calculateAndShowResult();
}

function calculateAndShowResult() {
  // Likert scoring:
  // For pole='E','S','T','J': value 1 = +2, 2 = +1, 3 = 0, 4 = -1, 5 = -2
  // For pole='I','N','F','P': value 1 = -2, 2 = -1, 3 = 0, 4 = +1, 5 = +2
  // Accumulate raw scores; positive = first letter, negative = second letter

  const raw = { EI: 0, SN: 0, TF: 0, JP: 0 };
  const count = { EI: 0, SN: 0, TF: 0, JP: 0 };

  const poleMap = { E:'EI', I:'EI', S:'SN', N:'SN', T:'TF', F:'TF', J:'JP', P:'JP' };
  const firstPole = { EI:'E', SN:'S', TF:'T', JP:'J' };

  questions.forEach((q, i) => {
    const val = answers[i]; // 1-5
    if (val === undefined) return;
    const dim = q.dim;
    const pole = q.pole; // E,I,S,N,T,F,J,P

    // Convert to -2..+2 where positive = "agree with statement"
    const score = 3 - val; // 1→+2, 2→+1, 3→0, 4→-1, 5→-2

    // If pole is the first letter of the dimension, positive score → first letter
    const isFirst = (pole === firstPole[dim]);
    raw[dim] += isFirst ? score : -score;
    count[dim]++;
  });

  // Determine type
  const type = [
    raw['EI'] >= 0 ? 'E' : 'I',
    raw['SN'] >= 0 ? 'S' : 'N',
    raw['TF'] >= 0 ? 'T' : 'F',
    raw['JP'] >= 0 ? 'J' : 'P',
  ].join('');

  // Calculate percentages for display
  const maxScore = { EI: 0, SN: 0, TF: 0, JP: 0 };
  questions.forEach(q => { maxScore[q.dim] += 2; });

  const pcts = {};
  ['EI','SN','TF','JP'].forEach(dim => {
    const max = maxScore[dim];
    // raw[dim] ranges from -max to +max
    // pct = proportion going to first pole
    pcts[dim] = Math.round((raw[dim] + max) / (2 * max) * 100);
  });

  showResult(type, pcts);
}

function showResult(type, pcts) {
  const r = RESULTS[type];

  document.getElementById('result-type').textContent = type;
  document.getElementById('result-archetype').textContent = r.archetype;
  document.getElementById('result-tagline').textContent = r.tagline;

  // Character illustration
  document.getElementById('character-showcase').innerHTML = `
    <div class="character-svg-wrap">${getCharacterSVG(type)}</div>
    <div style="max-width:280px; text-align:left;">
      <div class="eyebrow" style="margin-bottom:12px;">${r.tagline}</div>
      <div style="font-family:'Cormorant Garamond',serif; font-size:32px; font-style:italic; color:var(--deep); margin-bottom:12px;">${r.archetype}</div>
      <div style="font-size:14px; line-height:1.7; color:var(--mist);">
        ${type[0]==='E' ? '外向 (E)' : '内向 (I)'} · 
        ${type[1]==='S' ? '感觉 (S)' : '直觉 (N)'} · 
        ${type[2]==='T' ? '思维 (T)' : '情感 (F)'} · 
        ${type[3]==='J' ? '判断 (J)' : '感知 (P)'}
      </div>
    </div>
  `;

  // Dimension bars
  const dims = [
    { dim:'EI', left:'E', right:'I', pct: pcts['EI'] },
    { dim:'SN', left:'S', right:'N', pct: pcts['SN'] },
    { dim:'TF', left:'T', right:'F', pct: pcts['TF'] },
    { dim:'JP', left:'J', right:'P', pct: pcts['JP'] },
  ];

  document.getElementById('dims-content').innerHTML = dims.map(d => {
    const pct = d.pct;
    const dominant = pct >= 50 ? d.left : d.right;
    const pctDisplay = pct >= 50 ? pct : 100 - pct;
    return `
      <div class="dim-row">
        <div class="dim-label ${type.includes(d.left) ? '' : 'dim'}">${d.left}</div>
        <div class="dim-bar-track">
          <div class="dim-bar-fill" style="width:0%" data-target="${pct}%">
            <div class="dim-pct" style="left:0%" data-target="${pct}%">${pctDisplay}%</div>
          </div>
        </div>
        <div class="dim-label right ${type.includes(d.right) ? '' : 'dim'}">${d.right}</div>
      </div>
    `;
  }).join('');

  // Result sections
  document.getElementById('result-sections').innerHTML = `
    <div class="result-section">
      <div class="section-label">OVERVIEW · 人格概述</div>
      <div class="section-title">认识你自己</div>
      <div class="section-body">${r.desc}</div>
    </div>
    <div class="result-section">
      <div class="section-label">COGNITIVE FUNCTIONS · 荣格认知功能</div>
      <div class="section-title">你的心理功能栈</div>
      <div class="section-body" style="white-space:pre-line">${r.cognitive}</div>
    </div>
    <div class="result-section">
      <div class="section-label">STRENGTHS · 天赋优势</div>
      <div class="section-title">你天生擅长的事</div>
      <div class="traits-grid">
        ${r.strengths.map(s => `<div class="trait-tag">${s}</div>`).join('')}
      </div>
    </div>
    <div class="result-section">
      <div class="section-label">CAREER · 职业倾向</div>
      <div class="section-title">适合你的领域</div>
      <div class="section-body">${r.careers}</div>
    </div>
    <div class="result-section">
      <div class="section-label">COMPATIBILITY · 人际契合</div>
      <div class="section-title">与你最相契的类型</div>
      <div class="compatible-types">
        ${r.compatible.map(t => `<div class="type-pill">${t}</div>`).join('')}
      </div>
    </div>
    <div class="result-section">
      <div class="section-label">GROWTH · 成长方向</div>
      <div class="section-title">你的成长边疆</div>
      <div class="section-body">${r.growth}</div>
    </div>
  `;

  showScreen('result-screen');

  setTimeout(() => {
    document.querySelectorAll('.dim-bar-fill').forEach(bar => {
      bar.style.width = bar.dataset.target;
    });
    document.querySelectorAll('.dim-pct').forEach(el => {
      el.style.left = el.dataset.target;
    });
  }, 300);
}

function restartTest() {
  showScreen('intro-screen');
}

window.addEventListener('load', () => {
  const loading = document.getElementById('loading');
  setTimeout(() => {
    loading.classList.add('fade-out');
    setTimeout(() => {
      loading.style.display = 'none';
      showScreen('intro-screen');
    }, 800);
  }, 1200);
});
